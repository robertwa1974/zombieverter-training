<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Issue Tracker — ZombieVerter Training</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap');
:root{--bg:#0b0f10;--surface:#131a1c;--surface2:#1a2325;--accent:#00c896;--accent2:#00a0ff;--warn:#ffaa00;--danger:#ff4455;--text:#d8eeea;--muted:#4a6860;--border:#1e2d30;--mono:'Share Tech Mono',monospace;--display:'Barlow Condensed',sans-serif;--body:'Barlow',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--body);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-box{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:13px;font-weight:bold;color:#000;flex-shrink:0;}
.logo-text{font-family:var(--display);font-size:16px;font-weight:700;color:#fff;}
.header-sep{color:var(--border);font-size:20px;}
.header-title{font-family:var(--display);font-size:15px;color:var(--muted);letter-spacing:.03em;}
.header-actions{margin-left:auto;display:flex;gap:10px;align-items:center;}
.new-btn{font-family:var(--mono);font-size:11px;color:#0b0f10;background:var(--accent);text-decoration:none;padding:7px 14px;border-radius:4px;font-weight:bold;letter-spacing:.05em;transition:all .15s;}
.new-btn:hover{background:#00e6b0;}
.main{flex:1;max-width:900px;width:100%;margin:0 auto;padding:40px 24px;}
.stats{display:flex;gap:16px;margin-bottom:32px;flex-wrap:wrap;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 20px;flex:1;min-width:110px;}
.stat-val{font-family:var(--display);font-size:32px;font-weight:900;color:var(--accent);line-height:1;}
.stat-lbl{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:3px;letter-spacing:.06em;text-transform:uppercase;}
.filters{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;align-items:center;}
.filter-btn{font-family:var(--mono);font-size:11px;background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:6px 12px;border-radius:4px;cursor:pointer;transition:all .15s;}
.filter-btn:hover{border-color:var(--muted);color:var(--text);}
.filter-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(0,200,150,.06);}
.search-wrap{margin-left:auto;}
.search-wrap input{background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:7px 12px;color:var(--text);font-family:var(--mono);font-size:12px;outline:none;width:200px;transition:border-color .15s;}
.search-wrap input:focus{border-color:var(--accent);}
.search-wrap input::placeholder{color:var(--muted);}
.section-head{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.section-head::after{content:'';flex:1;height:1px;background:var(--border);}
.issues{display:flex;flex-direction:column;gap:10px;}
.issue-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px 20px;border-left:3px solid var(--border);transition:border-color .15s;}
.issue-card:hover{border-color:var(--muted);}
.issue-card.open{border-left-color:var(--danger);}
.issue-card.in-progress{border-left-color:var(--warn);}
.issue-card.resolved{border-left-color:var(--accent);opacity:.65;}
.issue-top{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap;}
.issue-module{font-family:var(--mono);font-size:11px;font-weight:bold;color:var(--accent);background:rgba(0,200,150,.08);border:1px solid rgba(0,200,150,.2);padding:3px 8px;border-radius:3px;white-space:nowrap;}
.issue-type{font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:3px;white-space:nowrap;}
.te{background:rgba(255,68,85,.1);color:#ff9aa3;border:1px solid rgba(255,68,85,.2);}
.tm{background:rgba(255,170,0,.1);color:#ffd080;border:1px solid rgba(255,170,0,.2);}
.ts{background:rgba(0,160,255,.1);color:#7abbdd;border:1px solid rgba(0,160,255,.2);}
.to{background:rgba(255,255,255,.05);color:var(--muted);border:1px solid var(--border);}
.status-badge{margin-left:auto;font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:3px;}
.so{background:rgba(255,68,85,.1);color:#ff9aa3;border:1px solid rgba(255,68,85,.2);}
.sp{background:rgba(255,170,0,.1);color:#ffd080;border:1px solid rgba(255,170,0,.2);}
.sr{background:rgba(0,200,150,.1);color:var(--accent);border:1px solid rgba(0,200,150,.2);}
.issue-module-title{font-size:11px;color:var(--muted);margin-bottom:6px;font-family:var(--mono);}
.issue-desc{font-size:13px;color:var(--text);line-height:1.6;margin-bottom:8px;}
.issue-meta{font-family:var(--mono);font-size:10px;color:var(--muted);}
.empty{text-align:center;padding:64px 24px;}
.empty-icon{font-size:48px;margin-bottom:16px;}
.empty h3{font-family:var(--display);font-size:28px;font-weight:700;color:var(--muted);margin-bottom:8px;}
.empty p{font-size:13px;color:var(--muted);}
.loading{text-align:center;padding:48px;font-family:var(--mono);font-size:13px;color:var(--muted);}
footer{border-top:1px solid var(--border);padding:20px 24px;text-align:center;font-family:var(--mono);font-size:11px;color:var(--muted);}
footer a{color:var(--accent);text-decoration:none;}
</style>
</head>
<body>
<div class="header">
  <a class="logo" href="index.html">
    <div class="logo-box">ZV</div>
    <span class="logo-text">ZombieVerter Training</span>
  </a>
  <span class="header-sep">·</span>
  <span class="header-title">Issue Tracker</span>
  <div class="header-actions">
    <a class="new-btn" href="feedback.html">+ New Issue</a>
  </div>
</div>

<div class="main">
  <div class="stats">
    <div class="stat"><div class="stat-val" id="statTotal">—</div><div class="stat-lbl">Total</div></div>
    <div class="stat"><div class="stat-val" id="statOpen" style="color:var(--danger)">—</div><div class="stat-lbl">Open</div></div>
    <div class="stat"><div class="stat-val" id="statProgress" style="color:var(--warn)">—</div><div class="stat-lbl">In Progress</div></div>
    <div class="stat"><div class="stat-val" id="statResolved" style="color:var(--accent)">—</div><div class="stat-lbl">Resolved</div></div>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" onclick="setFilter('open',this)">Open</button>
    <button class="filter-btn" onclick="setFilter('in-progress',this)">In Progress</button>
    <button class="filter-btn" onclick="setFilter('resolved',this)">Resolved</button>
    <button class="filter-btn" onclick="setFilter('Error in content',this)">🔴 Errors</button>
    <button class="filter-btn" onclick="setFilter('Missing information',this)">🟡 Missing</button>
    <button class="filter-btn" onclick="setFilter('Suggestion',this)">💡 Suggestions</button>
    <div class="search-wrap"><input type="search" id="searchInput" placeholder="Search issues…" oninput="renderIssues()"></div>
  </div>

  <div class="section-head" id="issueCount">Loading…</div>
  <div id="issueList"><div class="loading">Fetching issues…</div></div>
</div>

<footer>
  <a href="index.html">ZombieVerter VCU Training Series</a> ·
  <a href="feedback.html">Submit Feedback</a> ·
  <a href="https://github.com/robertwa1974/zombieverter-training">GitHub</a>
</footer>

<script>
let allIssues = [];
let activeFilter = 'all';

const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmtDate = iso => { try { return new Date(iso).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}); } catch(_){return iso;} };
const typeClass = t => ({  'Error in content':'te','Missing information':'tm','Suggestion':'ts'}[t]||'to');
const statusClass = s => ({'open':'so','in-progress':'sp','resolved':'sr'}[s]||'so');
const statusLabel = s => ({'open':'OPEN','in-progress':'IN PROGRESS','resolved':'RESOLVED'}[s]||'OPEN');
const cardClass = s => 'issue-card ' + (s||'open');

function setFilter(f,btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderIssues();
}

function renderIssues() {
  const q = (document.getElementById('searchInput').value||'').toLowerCase();
  const filtered = allIssues.filter(i => {
    const mf = activeFilter==='all' || i.status===activeFilter || i.issue_type===activeFilter;
    const ms = !q || [i.module_code,i.module_title,i.description,i.reporter,i.issue_type]
      .some(f=>(f||'').toLowerCase().includes(q));
    return mf && ms;
  });

  document.getElementById('issueCount').textContent = filtered.length + ' issue' + (filtered.length!==1?'s':'');

  if (!filtered.length) {
    document.getElementById('issueList').innerHTML = `<div class="empty">
      <div class="empty-icon">🔍</div><h3>No issues found</h3>
      <p>Try a different filter or <a href="feedback.html" style="color:var(--accent2)">submit a new one</a>.</p>
    </div>`;
    return;
  }

  document.getElementById('issueList').innerHTML = filtered.map(i=>`
    <div class="${cardClass(i.status)}">
      <div class="issue-top">
        <span class="issue-module">${esc(i.module_code)}</span>
        <span class="issue-type ${typeClass(i.issue_type)}">${esc(i.issue_type)}</span>
        <span class="status-badge ${statusClass(i.status)}">${statusLabel(i.status)}</span>
      </div>
      ${i.module_title?`<div class="issue-module-title">${esc(i.module_title)}</div>`:''}
      <div class="issue-desc">${esc(i.description)}</div>
      <div class="issue-meta">By ${esc(i.reporter||'Anonymous')} · ${fmtDate(i.date)}</div>
    </div>`).join('');
}

async function loadIssues() {
  try {
    const r = await window.storage.get('zv_issues', true);
    allIssues = r ? JSON.parse(r.value) : [];
  } catch(_) { allIssues = []; }

  document.getElementById('statTotal').textContent    = allIssues.length;
  document.getElementById('statOpen').textContent     = allIssues.filter(i=>i.status==='open').length;
  document.getElementById('statProgress').textContent = allIssues.filter(i=>i.status==='in-progress').length;
  document.getElementById('statResolved').textContent = allIssues.filter(i=>i.status==='resolved').length;
  renderIssues();
}

loadIssues();
</script>
</body>
</html>
