name: Build and Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PDF dependencies
        run: |
          pip install reportlab
          sudo apt-get install -y fonts-dejavu-core

      - name: Build PDF
        run: python3 scripts/build_pdf.py

      - name: Build HTML deck
        run: python3 scripts/build_html.py

      - name: Build classroom slide deck
        run: python3 scripts/build_slides.py

      - name: Commit built files back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add zombieverter-training-manual.pdf index-slides.html zombieverter-training-slides.html
          git diff --cached --quiet || git commit -m "ci: rebuild PDF, HTML deck, and slide deck [skip ci]"
          git push

      - name: Copy site files for Pages deploy
        run: |
          mkdir -p _site
          cp scripts/site-index.html _site/index.html
          cp index-slides.html _site/
          cp zombieverter-training-slides.html _site/
          cp zombieverter-training-manual.pdf _site/
          cp feedback.html _site/
          cp tracker.html _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy-pages:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
