name: Build & Deploy ZombieVerter Training Site

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Build PDF manual
        run: python3 scripts/build_pdf.py

      - name: Assemble site output
        run: |
          mkdir -p _site
          # HTML slide deck
          cp zombieverter-training-complete.html _site/index-slides.html
          # Generated PDF
          cp zombieverter-training-manual.pdf _site/zombieverter-training-manual.pdf
          # Landing page
          cp scripts/site-index.html _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4